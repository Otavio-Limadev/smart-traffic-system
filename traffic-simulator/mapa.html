<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Smart Traffic - Live Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.5.1/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
    
    <style>
        body { margin: 0; padding: 0; font-family: sans-serif; background: #1a1a1a; color: white; }
        #map { height: 100vh; width: 100%; }
        .info-panel { position: absolute; top: 10px; right: 10px; z-index: 1000; background: rgba(0,0,0,0.8); padding: 15px; border-radius: 8px; border: 1px solid #333; max-width: 250px; }
        .status-dot { height: 12px; width: 12px; border-radius: 50%; display: inline-block; margin-right: 5px; }
    </style>
</head>
<body>

    <div class="info-panel">
        <h3 style="margin-top:0">🚦 Smart Traffic Live</h3>
        <p id="status-text">Conectando ao servidor...</p>
        <hr>
        <div id="active-alerts">Aguardando dados...</div>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        // 1. Configurações Iniciais do Mapa (Focado em SP)
        const map = L.map('map').setView([-23.5616, -46.6560], 14); // Coordenadas da Paulista
        
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; OpenStreetMap'
        }).addTo(map);

        // 2. Banco de Dados Local dos Marcadores (Mapeando Nome -> Coordenadas)
        // No futuro, isso pode vir do seu Banco de Dados Java!
        const intersectionCoords = {
            "Av. Paulista x Al. Campinas": [-23.5645, -46.6521],
            "Av. Faria Lima x Av. JK": [-23.5899, -46.6788],
            "Cruzamento 3": [-23.5600, -46.6600] // Exemplo genérico
        };

        const markers = {}; // Guardará os objetos do Leaflet

        // 3. Conexão WebSocket (Igual ao seu teste anterior)
        const socket = new SockJS('http://localhost:8080/ws-traffic');
        const stompClient = Stomp.over(socket);
        stompClient.debug = null;

        stompClient.connect({}, function (frame) {
            document.getElementById('status-text').innerHTML = "✅ <span style='color:#00ff00'>Sistema Online</span>";
            
            stompClient.subscribe('/topic/traffic', function (mensagem) {
                const dados = JSON.parse(mensagem.body);
                atualizarMapa(dados);
            });
        });

        function atualizarMapa(dados) {
            const coords = intersectionCoords[dados.name] || [-23.56, -46.65];
            const cor = getCorStatus(dados.trafficLights[0].state);
            
            // Se o marcador não existe, cria. Se existe, atualiza.
            if (!markers[dados.name]) {
                markers[dados.name] = L.circleMarker(coords, {
                    radius: 12,
                    fillColor: cor,
                    color: "#fff",
                    weight: 2,
                    opacity: 1,
                    fillOpacity: 0.8
                }).addTo(map);
            } else {
                markers[dados.name].setStyle({ fillColor: cor });
            }

            // Adiciona um "balão" (Popup) com informações reais
            markers[dados.name].bindPopup(`
                <b>${dados.name}</b><br>
                🚗 Carros: ${dados.currentCarCount}<br>
                ☁️ Clima: ${dados.condition}<br>
                🚦 Sinal: <b>${dados.trafficLights[0].state}</b>
            `).openPopup();

            // Atualiza o painel lateral
            const alertDiv = document.getElementById('active-alerts');
            if(dados.condition === "ACCIDENT" || dados.condition === "HEAVY_RAIN") {
                alertDiv.innerHTML = `<div style="color: #ff4444">⚠️ ALERTA EM ${dados.name}</div>`;
            }
        }

        function getCorStatus(estado) {
            if (estado === "GREEN") return "#22c55e";
            if (estado === "YELLOW") return "#eab308";
            return "#ef4444";
        }
    </script>
</body>
</html>
